<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Free Sandbox Demo Server - QuantumHost</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <nav class="navbar sticky">
        <div class="container nav-container">
            <a href="../index.html" class="logo">Quantum<span>Host</span></a>
            <ul class="nav-menu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="../minecraft/index.html" class="nav-link">Minecraft</a></li>
                <li><a href="../vps/index.html" class="nav-link">VPS</a></li>
                <li><a href="../palworld/index.html" class="nav-link">Palworld</a></li>
                <li><a href="../web-hosting/index.html" class="nav-link">Web Hosting</a></li>
                <li><a href="../bot-hosting/index.html" class="nav-link">Bot Hosting</a></li>
                <li><a href="../support/index.html" class="nav-link">Support</a></li>
                <li><a href="../contact/index.html" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="section container" style="padding-top: 140px;">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <h2 style="margin-bottom: 12px; font-weight: 800; font-size: 2rem;">Request Sandbox <span>Demo Core</span></h2>
            <p style="color: var(--text-muted); margin-bottom: 24px;">Test internal frame response speeds for 48 hours completely free.</p>
            
            <form data-validate>
                <div class="form-group">
                    <label>Developer Identity Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Security Validated Email</label>
                    <input type="email" class="form-control" placeholder="developer@domain.com" required>
                </div>
                <div class="form-group">
                    <label>Discord Handle Address</label>
                    <input type="text" class="form-control" placeholder="username#0000" required>
                </div>
                <div class="form-group">
                    <label>Target Game Framework</label>
                    <select class="form-control" style="background: #000; color: #fff;" required>
                        <option value="minecraft">Minecraft Core</option>
                        <option value="palworld">Palworld Array</option>
                        <option value="bot">Application Node</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Memory Request Allocation</label>
                    <select class="form-control" style="background: #000; color: #fff;" required>
                        <option value="2">2GB Base Unit</option>
                        <option value="4">4GB Medium Unit</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Provision Sandbox Demo</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-bottom">
            <p>&copy; 2026 QuantumHost. Engineered with Absolute Architecture. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="../assets/js/script.js"></script>
